server:
  port: 8080

spring:
  application:
    name: media-gen
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/media_gen?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  # 开启定时任务（消费者轮询）
  task:
    scheduling:
      pool:
        size: 4

# MyBatis-Plus 配置
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 阿里云 OSS 配置（请替换为实际值）
oss:
  endpoint: https://oss-cn-hangzhou.aliyuncs.com
  access-key-id: your-access-key-id
  access-key-secret: your-access-key-secret
  bucket-name: your-bucket-name

# AI 大模型配置（请替换为实际值）
ai:
  dashscope:
    # 通义千问 API Key（从阿里云 DashScope 控制台获取）
    api-key: your-dashscope-api-key
    # 模型名称
    model: qwen-turbo
    # API 基础地址
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  tts:
    # TTS 语音合成 API 基础地址
    base-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text2audio/generation
    # 默认音色模型
    default-voice-id: sambert-zhichu-v1
